<div class="auth-layout">
  <!-- Lado izquierdo -->
  <div class="auth-image d-none d-md-flex">
    <div class="overlay">
      <h1>Biblioteca Virtual</h1>
      <p>Gestiona préstamos y descubre nuevos libros.</p>
    </div>
  </div>

  <!-- Lado derecho -->
  <div class="auth-form-container">
    <div class="card auth-card shadow p-4">
      <div class="card-body">
        <h2 class="text-center mb-4">Iniciar Sesión</h2>

        <div
          *ngIf="mensajeError"
          class="alert alert-danger text-center"
          role="alert"
        >
          {{ mensajeError }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <!-- Usuario -->
          <div class="form-floating mb-3">
            <input
              type="text"
              id="username"
              class="form-control"
              formControlName="username"
              placeholder=" "
              [ngClass]="{ 'is-invalid': loginForm.get('username')?.invalid && loginForm.get('username')?.touched }"
            />
            <label for="username">Usuario</label>
            <div class="invalid-feedback">El usuario es requerido.</div>
          </div>

          <!-- Contraseña -->
          <div class="form-floating mb-4">
            <input
              type="password"
              id="password"
              class="form-control"
              formControlName="password"
              placeholder=" "
              [ngClass]="{ 'is-invalid': loginForm.get('password')?.invalid && loginForm.get('password')?.touched }"
            />
            <label for="password">Contraseña</label>
            <div class="invalid-feedback">La contraseña es requerida.</div>
          </div>

          <div class="d-grid">
            <button
              type="submit"
              class="btn btn-primary"
              [disabled]="loginForm.invalid || loading"
            >
              <!-- Spinner -->
              <span
                *ngIf="loading"
                class="spinner-border spinner-border-sm me-2"
                role="status"
                aria-hidden="true"
              ></span>
              {{ loading ? 'Verificando...' : 'Ingresar' }}
            </button>
          </div>
        </form>

        <div class="mt-3 text-center">
          <small
            >¿No tienes cuenta?
            <a routerLink="/auth/registro">Regístrate aquí</a></small
          >
        </div>
      </div>
    </div>
  </div>
</div>
