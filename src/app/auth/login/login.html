<div class="auth-layout">
  <!-- Lado izquierdo -->
  <div class="auth-image d-none d-md-flex">
    <div class="overlay">
      <h1>Biblioteca Virtual</h1>
      <p>Gestiona préstamos y descubre nuevos libros.</p>
    </div>
  </div>

  <!-- Lado derecho -->
  <div class="auth-form-container">
    <div class="card auth-card shadow p-4 animate__animated animate__fadeInUp">
      <div class="card-body">
        <h2 class="text-center mb-4">Iniciar Sesión</h2>

        <div
          *ngIf="mensajeError"
          class="alert alert-danger text-center"
          role="alert"
        >
          {{ mensajeError }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <!-- Usuario -->
          <div class="form-floating mb-4">
            <input
              type="text"
              id="username"
              class="form-control"
              formControlName="username"
              placeholder=" "
              [ngClass]="{ 'is-invalid': loginForm.get('username')?.invalid && loginForm.get('username')?.touched }"
            />
            <label for="username">Usuario</label>
            <div class="invalid-feedback">El usuario es requerido.</div>
          </div>

          <!-- Contraseña -->
          <div class="form-floating mb-4 position-relative">
            <input
              [type]="mostrarPassword ? 'text' : 'password'"
              id="password"
              class="form-control"
              formControlName="password"
              placeholder=" "
              [ngClass]="{ 'is-invalid': loginForm.get('password')?.invalid && loginForm.get('password')?.touched }"
            />
            <label for="password">Contraseña</label>

            <!-- Botón ojo -->
            <button
              type="button"
              class="btn-eye"
              (click)="mostrarPassword = !mostrarPassword"
              tabindex="-1"
            >
              <!-- Ojo cerrado -->
              <svg
                *ngIf="!mostrarPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                fill="currentColor"
                class="text-muted"
                viewBox="0 0 16 16"
              >
                <path
                  d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486z"
                />
                <path
                  d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829"
                />
                <path
                  d="M3.35 5.47c-.18.16-.353.322-.518.487A13.134 13.134 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7.029 7.029 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238zm10.296 8.884-12-12 .708-.708 12 12z"
                />
              </svg>
              <!-- Ojo abierto -->
              <svg
                *ngIf="mostrarPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                fill="currentColor"
                class="text-muted"
                viewBox="0 0 16 16"
              >
                <path
                  d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"
                />
                <path
                  d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"
                />
              </svg>
            </button>

            <div class="invalid-feedback">La contraseña es requerida.</div>
          </div>

          <div class="d-grid">
            <button
              type="submit"
              class="btn btn-primary"
              [disabled]="loginForm.invalid || loading"
            >
              <!-- Spinner -->
              <span
                *ngIf="loading"
                class="spinner-border spinner-border-sm me-2"
                role="status"
                aria-hidden="true"
              ></span>
              {{ loading ? 'Verificando...' : 'Ingresar' }}
            </button>
          </div>
        </form>

        <div class="mt-3 text-center">
          <small
            >¿No tienes cuenta?
            <a routerLink="/auth/registro">Regístrate aquí</a></small
          >
        </div>
      </div>
    </div>
  </div>
</div>
