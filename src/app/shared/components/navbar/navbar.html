<nav
  class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 animate__animated animate__fadeInDown position-relative"
  style="z-index: 1050"
  *ngIf="isLoggedIn"
>
  <div class="container">
    <a class="navbar-brand" [routerLink]="isStaff ? '/libros' : '/catalogo'">
      📚 BiblioVirtual
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <!-- STAFF: ADMIN + BIBLIOTECARIO -->
        <ng-container *ngIf="isStaff">
          <li class="nav-item">
            <a class="nav-link" routerLink="/libros" routerLinkActive="active">
              📚 Libros
            </a>
          </li>

          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/prestamos"
              routerLinkActive="active"
            >
              🛎️ Solicitudes
            </a>
          </li>

          <!-- SOLO ADMIN -->
          <ng-container *ngIf="isAdmin">
            <li class="nav-item">
              <a
                class="nav-link"
                routerLink="/dashboard"
                routerLinkActive="active"
              >
                📊 Dashboard
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link"
                routerLink="/autores"
                routerLinkActive="active"
              >
                ✍️ Autores
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link"
                routerLink="/generos"
                routerLinkActive="active"
              >
                🎭 Géneros
              </a>
            </li>
          </ng-container>

          <li class="nav-item ms-lg-3 border-start ps-lg-3">
            <a
              class="nav-link text-info text-opacity-80"
              routerLink="/catalogo"
              routerLinkActive="active"
            >
              👀 Ver Catálogo
            </a>
          </li>
        </ng-container>

        <!-- USER -->
        <li class="nav-item" *ngIf="isUser">
          <a class="nav-link" routerLink="/catalogo" routerLinkActive="active">
            📖 Catálogo
          </a>
        </li>
      </ul>

      <!-- USUARIO -->
      <ul class="navbar-nav">
        <li class="nav-item dropdown">
          <a
            class="nav-link dropdown-toggle"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            style="cursor: pointer"
          >
            Hola, <strong>{{ usuarioNombre }}</strong>
          </a>

          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <span class="dropdown-item-text text-muted small">
                Rol: {{ rolFormateado }}
              </span>
            </li>
            <li><hr class="dropdown-divider" /></li>
            <li>
              <button
                class="dropdown-item text-danger"
                type="button"
                (click)="logout()"
              >
                🚪 Cerrar Sesión
              </button>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
